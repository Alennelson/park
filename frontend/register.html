<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - ASP | A Space for Park</title>
  <meta name="description" content="Create your ASP (A Space for Park) account to start booking parking spaces or list your parking space for rent. Join thousands of users today.">
  <meta name="keywords" content="parking registration, sign up parking, parking account, rent parking space, list parking">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://www.alen.club/register.html">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.alen.club/register.html">
  <meta property="og:title" content="Register - ASP | A Space for Park">
  <meta property="og:description" content="Create your ASP account to start booking parking spaces or list your parking space for rent.">
  <meta property="og:image" content="https://www.alen.club/og-image.jpg">
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://www.alen.club/register.html">
  <meta property="twitter:title" content="Register - ASP | A Space for Park">
  <meta property="twitter:description" content="Create your ASP account to start booking parking spaces or list your parking space for rent.">
  <meta property="twitter:image" content="https://www.alen.club/og-image.jpg">
  
  <script src="config.js"></script>

  <style>
    body {
      background: #FFD400;
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 0;
    }

    .box {
      width: 320px;
      background: #FFC800;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      margin: 20px 0;
    }

    .input-group {
      position: relative;
      margin-bottom: 8px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      box-sizing: border-box;
    }

    select {
      background: white;
      cursor: pointer;
    }

    .file-upload-wrapper {
      margin: 8px 0;
      background: white;
      border-radius: 10px;
      padding: 15px;
      border: 2px solid #4CAF50;
      box-shadow: 0 2px 8px rgba(76, 175, 80, 0.2);
    }

    .file-upload-label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
    }

    input[type="file"] {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      background: #f5f5f5;
      cursor: pointer;
      border: 1px solid #ddd;
      border-radius: 5px;
    }

    input[type="file"]::-webkit-file-upload-button {
      background: #4CAF50;
      color: white;
      padding: 8px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    input[type="file"]::-webkit-file-upload-button:hover {
      background: #45a049;
    }

    .file-info {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      font-weight: bold;
    }

    .required-star {
      color: #f44336;
      font-weight: bold;
      font-size: 16px;
    }

    .eye {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      background: black;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    /* LOADING OVERLAY */
    .loading-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }

    .loading-box {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid #f3f3f3;
      border-top: 6px solid #FFD400;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 18px;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
    }

    .loading-subtext {
      font-size: 14px;
      color: #666;
    }

    .dots {
      display: inline-block;
      animation: dots 1.5s infinite;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }
  </style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <div class="loading-text">Creating Your Account</div>
    <div class="loading-subtext">Please wait a moment<span class="dots">...</span></div>
  </div>
</div>

<div class="box">
  <h2>Create Account</h2>

  <input id="name" placeholder="Name" required>
  <input id="email" type="email" placeholder="Email" required>
  <input id="phone" type="tel" placeholder="Phone Number" required>

  <!-- PASSWORD -->
  <div class="input-group">
    <input id="password" type="password" placeholder="Password" required>
    <span class="eye" onclick="togglePassword('password', this)">👁️</span>
  </div>

  <!-- CONFIRM PASSWORD -->
  <div class="input-group">
    <input id="confirm" type="password" placeholder="Re-enter Password" required>
    <span class="eye" onclick="togglePassword('confirm', this)">👁️</span>
  </div>

  <!-- ID VERIFICATION SECTION -->
  <div style="background: #e8f5e9; padding: 15px; border-radius: 10px; margin: 15px 0; border: 2px solid #4CAF50;">
    <h3 style="margin: 0 0 10px 0; font-size: 16px; color: #2e7d32;">
      🛡️ ID Verification Required <span class="required-star">*</span>
    </h3>
    <p style="font-size: 12px; color: #555; margin: 0 0 15px 0;">
      Upload a clear photo of your government-issued ID to prevent fraud and ensure platform security.
    </p>
    
    <!-- ID PROOF TYPE -->
    <select id="idProofType" required style="margin-bottom: 15px;">
      <option value="">Select ID Proof Type *</option>
      <option value="aadhaar">🪪 Aadhaar Card</option>
      <option value="passport">📘 Passport</option>
      <option value="driving_license">🚗 Driving License</option>
      <option value="voter_id">🗳️ Voter ID</option>
      <option value="pan_card">💳 PAN Card</option>
    </select>

    <!-- ID PROOF UPLOAD -->
    <div class="file-upload-wrapper">
      <label class="file-upload-label">
        📤 Upload ID Proof Photo <span class="required-star">*</span>
      </label>
      <input type="file" id="idProof" accept="image/jpeg,image/jpg,image/png" required onchange="showFileName(this)">
      <div class="file-info" id="fileInfo">
        📷 Accepted: JPG, PNG only (Max 5MB)
      </div>
    </div>
  </div>

  <button onclick="register()">Register</button>
</div>

<script>
/* SHOW SELECTED FILE NAME */
function showFileName(input) {
  const fileInfo = document.getElementById('fileInfo');
  if (input.files && input.files[0]) {
    const file = input.files[0];
    const fileSizeMB = (file.size / (1024 * 1024)).toFixed(2);
    
    // Check if it's an image
    const allowedTypes = ['image/jpeg', 'image/jpg', 'image/png'];
    if (!allowedTypes.includes(file.type)) {
      fileInfo.innerHTML = '❌ Invalid file type! Only JPG and PNG images accepted.';
      fileInfo.style.color = '#f44336';
      fileInfo.style.fontWeight = 'bold';
      input.value = ''; // Clear the invalid file
      return;
    }
    
    fileInfo.innerHTML = `✅ Selected: ${file.name} (${fileSizeMB} MB)`;
    fileInfo.style.color = '#4CAF50';
    fileInfo.style.fontWeight = 'bold';
  } else {
    fileInfo.innerHTML = '📷 Accepted: JPG, PNG only (Max 5MB)';
    fileInfo.style.color = '#666';
  }
}

/* SHOW / HIDE PASSWORD */
function togglePassword(id, el) {
  const input = document.getElementById(id);
  if (input.type === "password") {
    input.type = "text";
    el.textContent = "🙈";
  } else {
    input.type = "password";
    el.textContent = "👁️";
  }
}

/* SHOW LOADING */
function showLoading() {
  document.getElementById('loadingOverlay').style.display = 'flex';
}

/* HIDE LOADING */
function hideLoading() {
  document.getElementById('loadingOverlay').style.display = 'none';
}

/* REGISTER */
async function register() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value.trim();
  const confirm = document.getElementById("confirm").value.trim();
  const idProofType = document.getElementById("idProofType").value;
  const idProofFile = document.getElementById("idProof").files[0];

  console.log("=== REGISTRATION STARTED ===");
  console.log("Form data:", { name, email, phone, idProofType, hasFile: !!idProofFile });

  // Validation
  if (!name || !email || !phone || !password || !confirm) {
    alert("⚠️ Please fill all fields");
    return;
  }

  if (!idProofType) {
    alert("⚠️ Please select ID proof type");
    return;
  }

  if (!idProofFile) {
    alert("⚠️ ID Proof Photo Required\n\nPlease upload a clear photo of your Aadhaar card or any valid government-issued ID proof.\n\nAccepted formats: JPG, PNG only\nMax size: 5MB");
    return;
  }

  // Check file type (images only)
  const allowedTypes = ['image/jpeg', 'image/jpg', 'image/png'];
  if (!allowedTypes.includes(idProofFile.type)) {
    alert("⚠️ Invalid File Type\n\nPlease upload an image file only.\n\nAccepted formats: JPG, PNG\nPDF files are not accepted.");
    return;
  }

  // Check file size (5MB limit)
  if (idProofFile.size > 5 * 1024 * 1024) {
    alert("⚠️ File size too large!\n\nPlease upload an image smaller than 5MB.");
    return;
  }

  if (password !== confirm) {
    alert("⚠️ Passwords do not match");
    return;
  }

  console.log("✅ Validation passed");
  console.log("File details:", {
    name: idProofFile.name,
    size: (idProofFile.size / 1024).toFixed(2) + ' KB',
    type: idProofFile.type
  });

  // Show loading animation
  showLoading();

  // Create FormData for file upload
  const formData = new FormData();
  formData.append('name', name);
  formData.append('email', email);
  formData.append('phone', phone);
  formData.append('password', password);
  formData.append('idProofType', idProofType);
  formData.append('idProof', idProofFile);

  const apiUrl = getApiUrl("/api/auth/register");
  console.log("Sending request to:", apiUrl);

  try {
    const response = await fetch(apiUrl, {
      method: "POST",
      body: formData // Don't set Content-Type, browser will set it with boundary
    });

    console.log("Response status:", response.status);
    console.log("Response headers:", Object.fromEntries(response.headers.entries()));
    
    const data = await response.json();
    console.log("Response data:", data);
    
    // Hide loading
    hideLoading();
    
    if (!data.success) {
      console.error("❌ Registration failed:", data.message);
      alert("❌ Registration Failed\n\n" + (data.message || "Unknown error"));
      return;
    }

    console.log("✅ Registration successful!");
    alert("✅ Registration Successful!\n\n📋 Your account has been created and is pending admin verification.\n\n⏳ What happens next?\n1. Admin will review your ID proof\n2. You'll receive approval within 24-48 hours\n3. Once approved, you can login and use ASP\n\n📧 Check your email for updates.\n\nRedirecting to login page...");

    /* AUTO REDIRECT AFTER 3 SECONDS */
    setTimeout(() => {
      console.log("Redirecting to login page...");
      window.location.href = "login.html";
    }, 3000);
  } catch (err) {
    console.error("=== REGISTRATION ERROR ===");
    console.error("Error:", err);
    console.error("Stack:", err.stack);
    hideLoading();
    alert("❌ Server error. Please try again.\n\nError: " + err.message);
  }
}
</script>

</body>
</html>
